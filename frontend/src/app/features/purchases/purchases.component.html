<div class="page-header">
  <h2>進貨登記</h2>
  <mat-form-field appearance="outline">
    <mat-label>選擇日期</mat-label>
    <input matInput [matDatepicker]="picker" [formControl]="dateControl" />
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>
</div>

<button mat-raised-button color="primary" (click)="addPurchase()">
  <mat-icon>add</mat-icon> 新增進貨
</button>

<table
  mat-table
  [dataSource]="purchases"
  class="full-width"
  style="margin-top: 16px"
>
  <ng-container matColumnDef="product">
    <th mat-header-cell *matHeaderCellDef>品名</th>
    <td mat-cell *matCellDef="let p">{{ p.variant?.product?.name }}</td>
  </ng-container>
  <ng-container matColumnDef="color">
    <th mat-header-cell *matHeaderCellDef>顏色</th>
    <td mat-cell *matCellDef="let p">{{ p.variant?.color }}</td>
  </ng-container>
  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef>數量</th>
    <td mat-cell *matCellDef="let p">{{ p.quantity }}</td>
  </ng-container>
  <ng-container matColumnDef="unitCost">
    <th mat-header-cell *matHeaderCellDef>進貨單價</th>
    <td mat-cell *matCellDef="let p">
      {{ p.unitCost | currency: "TWD" : "symbol" : "1.0-0" }}
    </td>
  </ng-container>
  <ng-container matColumnDef="total">
    <th mat-header-cell *matHeaderCellDef>小計</th>
    <td mat-cell *matCellDef="let p">
      {{ p.quantity * p.unitCost | currency: "TWD" : "symbol" : "1.0-0" }}
    </td>
  </ng-container>
  <ng-container matColumnDef="note">
    <th mat-header-cell *matHeaderCellDef>備註</th>
    <td mat-cell *matCellDef="let p">{{ p.note }}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>操作</th>
    <td mat-cell *matCellDef="let p">
      <button mat-icon-button color="warn" (click)="deletePurchase(p)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
