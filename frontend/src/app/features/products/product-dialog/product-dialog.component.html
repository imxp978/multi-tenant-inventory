<h2 mat-dialog-title>{{ isEdit ? "編輯品項" : "新增品項" }}</h2>
<form [formGroup]="form">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>SKU</mat-label>
      <input matInput formControlName="sku" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>品名</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>分類</mat-label>
      <mat-select formControlName="categoryId">
        <mat-option [value]="null">-- 無 --</mat-option>
        <mat-option *ngFor="let c of categories" [value]="c.id">{{
          c.name
        }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>售價</mat-label>
      <input matInput type="number" formControlName="sellingPrice" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>供應商連結</mat-label>
      <input matInput formControlName="supplierUrl" placeholder="https://..." />
    </mat-form-field>

    <!-- 新增模式：可加入variant -->
    <div *ngIf="!isEdit" formArrayName="variants">
      <h4>
        顏色變體
        <button mat-icon-button type="button" (click)="addVariant()">
          <mat-icon>add_circle</mat-icon>
        </button>
      </h4>
      <div
        *ngFor="let v of variantArray.controls; let i = index"
        [formGroupName]="i"
        class="variant-row"
      >
        <mat-form-field appearance="outline">
          <mat-label>顏色</mat-label>
          <input matInput formControlName="color" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>變體SKU</mat-label>
          <input matInput formControlName="variantSku" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>成本</mat-label>
          <input matInput type="number" formControlName="costPrice" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>庫存</mat-label>
          <input matInput type="number" formControlName="stock" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>警示庫存</mat-label>
          <input matInput type="number" formControlName="minStock" min="0" />
        </mat-form-field>

        <button
          mat-icon-button
          type="button"
          color="warn"
          (click)="removeVariant(i)"
        >
          <mat-icon>remove_circle</mat-icon>
        </button>
      </div>
    </div>
  </mat-dialog-content>
</form>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>取消</button>
  <button
    mat-raised-button
    color="primary"
    (click)="save()"
    [disabled]="form.invalid"
  >
    儲存
  </button>
</mat-dialog-actions>
