<div class="page-header">
  <h2>分類管理</h2>
  <button mat-raised-button color="primary" (click)="openDialog()">
    <mat-icon>add</mat-icon> 新增分類
  </button>
</div>
<table mat-table [dataSource]="categories" class="full-width">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>名稱</th>
    <td mat-cell *matCellDef="let c">{{ c.name }}</td>
  </ng-container>
  <ng-container matColumnDef="sortOrder">
    <th mat-header-cell *matHeaderCellDef>排序</th>
    <td mat-cell *matCellDef="let c">{{ c.sortOrder }}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>操作</th>
    <td mat-cell *matCellDef="let c">
      <button mat-icon-button (click)="openDialog(c)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete(c)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
