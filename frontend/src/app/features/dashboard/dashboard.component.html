<div class="container">
  <h2 class="page-title">儀表板</h2>

  <div class="summary-cards">
    <mat-card class="summary-card sale-card">
      <mat-card-header>
        <mat-icon mat-card-avatar>point_of_sale</mat-icon>
        <mat-card-title>今日銷售</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="big-number">
          {{ todayTotal | currency: "TWD" : "symbol" : "1.0-0" }}
        </p>
        <small class="text-muted">{{ todayItemCount }} 件商品</small>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="alert-section" *ngIf="lowStockItems.length">
    <h3 class="section-title">
      <mat-icon color="warn">warning</mat-icon>
      低庫存提醒
    </h3>

    <mat-card>
      <table mat-table [dataSource]="lowStockItems">
        <ng-container matColumnDef="productName">
          <th mat-header-cell *matHeaderCellDef>品名</th>
          <td mat-cell *matCellDef="let element">
            {{ element.productName }}
          </td>
        </ng-container>

        <ng-container matColumnDef="sku">
          <th mat-header-cell *matHeaderCellDef>SKU</th>
          <td mat-cell *matCellDef="let element">
            {{ element.sku }}
          </td>
        </ng-container>

        <ng-container matColumnDef="supplierUrl">
          <th mat-header-cell *matHeaderCellDef>供應商</th>
          <td mat-cell *matCellDef="let p">
            <a
              *ngIf="p.supplierUrl"
              [href]="p.supplierUrl"
              target="_blank"
              mat-icon-button
              matTooltip="開啟供應商頁面"
            >
              <mat-icon>open_in_new</mat-icon>
            </a>
          </td>
        </ng-container>

        <ng-container matColumnDef="color">
          <th mat-header-cell *matHeaderCellDef>款式</th>
          <td mat-cell *matCellDef="let element">{{ element.color }}</td>
        </ng-container>

        <ng-container matColumnDef="stock">
          <th mat-header-cell *matHeaderCellDef>庫存</th>
          <td
            mat-cell
            *matCellDef="let element"
            [class.low-stock]="element.stock <= element.minStock"
          >
            {{ element.stock }} / {{ element.minStock }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>
  </div>

  <div *ngIf="!lowStockItems.length" class="no-alerts">
    <mat-icon color="primary">check_circle</mat-icon>
    <p>目前庫存量充足</p>
  </div>
</div>
