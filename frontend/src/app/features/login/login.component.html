<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>進銷存系統</mat-card-title>
      <mat-card-subtitle>請登入</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>帳號</mat-label>
          <input matInput formControlName="username" (keyup.enter)="login()" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>密碼</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            (keyup.enter)="login()"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword"
          >
            <mat-icon>{{
              hidePassword ? "visibility_off" : "visibility"
            }}</mat-icon>
          </button>
        </mat-form-field>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <button
        mat-raised-button
        color="primary"
        (click)="login()"
        [disabled]="loading || form.invalid"
        class="full-width"
      >
        {{ loading ? "登入中..." : "登入" }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
