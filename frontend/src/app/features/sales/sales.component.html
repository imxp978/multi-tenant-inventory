<div class="page-header">
  <h2>每日銷售</h2>
  <mat-form-field appearance="outline">
    <mat-label>選擇日期</mat-label>
    <input matInput [matDatepicker]="picker" [formControl]="dateControl" />
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>
</div>

<button mat-raised-button color="primary" (click)="addItem()">
  <mat-icon>add</mat-icon> 新增銷售品項
</button>

<table
  mat-table
  [dataSource]="order?.items || []"
  class="full-width"
  style="margin-top: 16px"
>
  <ng-container matColumnDef="product">
    <th mat-header-cell *matHeaderCellDef>品名</th>
    <td mat-cell *matCellDef="let item">{{ item.variant?.product?.name }}</td>
  </ng-container>
  <ng-container matColumnDef="color">
    <th mat-header-cell *matHeaderCellDef>顏色</th>
    <td mat-cell *matCellDef="let item">{{ item.variant?.color }}</td>
  </ng-container>
  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef>數量</th>
    <td mat-cell *matCellDef="let item">{{ item.quantity }}</td>
  </ng-container>
  <ng-container matColumnDef="unitPrice">
    <th mat-header-cell *matHeaderCellDef>單價</th>
    <td mat-cell *matCellDef="let item">
      {{ item.unitPrice | currency: "TWD" : "symbol" : "1.0-0" }}
    </td>
  </ng-container>
  <ng-container matColumnDef="subtotal">
    <th mat-header-cell *matHeaderCellDef>小計</th>
    <td mat-cell *matCellDef="let item">
      {{ item.subtotal | currency: "TWD" : "symbol" : "1.0-0" }}
    </td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>操作</th>
    <td mat-cell *matCellDef="let item">
      <button mat-icon-button color="warn" (click)="removeItem(item)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<div class="total" *ngIf="order">
  <h3>
    日總計：{{ order.totalAmount | currency: "TWD" : "symbol" : "1.0-0" }}
  </h3>
</div>
