<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile"
    class="sidenav"
  >
    <div class="sidenav-header">
      <h3>進銷存系統</h3>
    </div>

    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/dashboard"
        routerLinkActive="active"
        (click)="isMobile && sidenav.close()"
      >
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>儀表板</span>
      </a>
      <a
        mat-list-item
        routerLink="/products"
        routerLinkActive="active"
        (click)="isMobile && sidenav.close()"
      >
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>品項管理</span>
      </a>
      <a
        mat-list-item
        routerLink="/categories"
        routerLinkActive="active"
        (click)="isMobile && sidenav.close()"
      >
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>分類管理</span>
      </a>
      <a
        mat-list-item
        routerLink="/sales"
        routerLinkActive="active"
        (click)="isMobile && sidenav.close()"
      >
        <mat-icon matListItemIcon>point_of_sale</mat-icon>
        <span matListItemTitle>每日銷售</span>
      </a>
      <a
        mat-list-item
        routerLink="/purchases"
        routerLinkActive="active"
        (click)="isMobile && sidenav.close()"
      >
        <mat-icon matListItemIcon>local_shipping</mat-icon>
        <span matListItemTitle>進貨登記</span>
      </a>
      <a
        mat-list-item
        routerLink="/reports"
        routerLinkActive="active"
        (click)="isMobile && sidenav.close()"
      >
        <mat-icon matListItemIcon>assessment</mat-icon>
        <span matListItemTitle>月結報表</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <!-- 漢堡 -->
      <button
        mat-icon-button
        *ngIf="isMobile"
        (click)="sidenav.toggle()"
        matTooltip="選單"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span *ngIf="isMobile" class="app-title">進銷存系統</span>
      <span class="spacer"></span>
      <span class="user-name" *ngIf="!isMobile">{{
        auth.currentUser?.displayName
      }}</span>
      <button mat-icon-button (click)="auth.logout()" matTooltip="登出">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
